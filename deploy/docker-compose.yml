# ============================================================================
# 本地源码构建专用 compose 文件 —— `docker compose -f deploy/docker-compose.yml up --build`
#
# ⚠️ 重要：构建前必须先在仓库根目录跑前端 build，生成 web/dist/ 才能让
# Go 的 //go:embed dist 工作。推荐用 `make docker`（自动 npm build + docker build）
# 一步到位；或者手动两步：
#
#   cd web && npm ci && npm run build && cd ..
#   docker compose -f deploy/docker-compose.yml up --build -d
#
# 否则镜像里的 WebUI 会是空白或旧版本。
# ============================================================================

services:
  frpmgrd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: frpmgr-server:${VERSION:-dev}
    container_name: frpmgrd
    restart: unless-stopped
    # host network is recommended for frpc so that xtcp / NAT hole
    # punching works correctly. Switch to bridge if you only need plain
    # tcp/http proxies and want stricter isolation.
    network_mode: host
    environment:
      FRPMGR_API_TOKEN: ${FRPMGR_API_TOKEN:?api token required (set in .env)}
      FRPMGR_HTTP_ADDR: ":${FRPMGR_HTTP_PORT:-8080}"
      FRPMGR_CORS_ORIGINS: ${FRPMGR_CORS_ORIGINS:-*}
      FRPMGR_LOG_LEVEL: ${FRPMGR_LOG_LEVEL:-info}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "/usr/local/bin/frpmgrd", "health", "-addr", "http://127.0.0.1:${FRPMGR_HTTP_PORT:-8080}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
