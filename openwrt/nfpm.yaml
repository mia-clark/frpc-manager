# =============================================================================
# nfpm 配置模板 — 生成 frpcmgrd 的「单个 all 架构」OpenWrt .ipk 包
#
#   本包是 Architecture: all：不含任何 CPU 相关二进制，只装壳子：
#     procd 服务脚本 + UCI 配置 + frpcmgrd-fetch（装时按本机 CPU 联网拉二进制）。
#   一个包到处可装，由 postinst 调 frpcmgrd-fetch 下载对应架构的 frpcmgrd 到 /usr/bin。
#
#   __XXX__ 占位符由 build-ipk.sh 用 sed 渲染（src 均为绝对路径，消除 CWD 歧义）：
#     __PKG_VERSION__ / __PKG_RELEASE__  版本与包修订号  -> 包版本 <ver>-<rel>
#     __INITD_SRC__ __CONFIG_SRC__ __FETCH_SRC__ __VERSION_SRC__  随包文件绝对路径
#     __POSTINST__ __PRERM__ __POSTRM__  维护脚本绝对路径
#
#   产出可被 opkg (OpenWrt <=24.10) 安装的 ipk。OpenWrt 25.12+ 默认 apk(APKv3)，
#   需另走 SDK，详见 openwrt/README.md。
# =============================================================================

name: "frpcmgrd"
arch: "all"
platform: "linux"
version: "__PKG_VERSION__"
release: "__PKG_RELEASE__"
section: "net"
priority: "optional"
maintainer: "mia-clark <mia-clark@users.noreply.github.com>"
vendor: "mia-clark"
homepage: "https://github.com/mia-clark/frpc-manager"
license: "GPL-3.0"
description: |
  Headless FRP client manager (frpcmgrd), OpenWrt wrapper (all-arch).
  Ships the procd service, UCI config and a fetcher that downloads the
  CPU-matching frpcmgrd binary from GitHub Releases on install. One package
  installs on any architecture. Configure via UCI at /etc/config/frpcmgrd.

# 壳子包无运行时依赖（二进制是纯静态、装时下载）
depends: []

contents:
  # procd 服务脚本
  - src: "__INITD_SRC__"
    dst: "/etc/init.d/frpcmgrd"
    file_info:
      mode: 0755

  # UCI 默认配置 (标记 config|noreplace：升级时保留用户修改)
  - src: "__CONFIG_SRC__"
    dst: "/etc/config/frpcmgrd"
    type: "config|noreplace"
    file_info:
      mode: 0644

  # 二进制拉取器（按 CPU 架构联网下载对应二进制）
  - src: "__FETCH_SRC__"
    dst: "/usr/sbin/frpcmgrd-fetch"
    file_info:
      mode: 0755

  # 随包版本号（frpcmgrd-fetch 默认拉取此版本）
  - src: "__VERSION_SRC__"
    dst: "/usr/lib/frpcmgrd/VERSION"
    file_info:
      mode: 0644

scripts:
  postinstall: "__POSTINST__"
  preremove: "__PRERM__"
  postremove: "__POSTRM__"

# 单个 all 包，Architecture: all 可装到任意设备
ipk:
  arch: "all"
